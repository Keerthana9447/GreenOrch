---
# GreenOrch v3 — Kubernetes Deployment Manifests
# Track 4: Sustainable Orchestration — 3SVK Hackathon
# Apply: kubectl apply -f greenorch-k8s.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: greenorch
  labels:
    app: greenorch
    track: "sustainable-orchestration"
    hackathon: "3svk"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: greenorch-config
  namespace: greenorch
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  ENVIRONMENT: "production"
  CARBON_BUDGET_KG: "100"
  ML_MODEL: "ensemble-v3"

---
# ── Backend Deployment ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenorch-backend
  namespace: greenorch
  labels:
    app: greenorch-backend
    component: api
    version: "3.0.0"
    track: "sustainable-orchestration"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greenorch-backend
  template:
    metadata:
      labels:
        app: greenorch-backend
        component: api
      annotations:
        # Carbon-aware scheduling annotations
        greenorch.io/carbon-aware: "true"
        greenorch.io/preferred-region: "eu-north"
        greenorch.io/max-carbon-intensity: "0.2"
    spec:
      # Node affinity: prefer low-carbon nodes
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values:
                      - eu-north
                      - us-west
                      - us-central
      containers:
        - name: greenorch-api
          image: greenorch/backend:3.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: greenorch-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: greenorch-backend-svc
  namespace: greenorch
spec:
  selector:
    app: greenorch-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ── Frontend Deployment ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenorch-frontend
  namespace: greenorch
  labels:
    app: greenorch-frontend
    component: ui
    version: "3.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greenorch-frontend
  template:
    metadata:
      labels:
        app: greenorch-frontend
        component: ui
      annotations:
        greenorch.io/carbon-aware: "true"
    spec:
      containers:
        - name: greenorch-ui
          image: greenorch/frontend:3.0.0
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://greenorch-backend-svc:8000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: greenorch-frontend-svc
  namespace: greenorch
spec:
  selector:
    app: greenorch-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer

---
# ── Horizontal Pod Autoscaler ─────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: greenorch-backend-hpa
  namespace: greenorch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: greenorch-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── Carbon-Aware PriorityClass ─────────────────────────────────────
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: green-workload-high
value: 1000
globalDefault: false
description: "High priority for carbon-optimized workloads in green regions"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: green-workload-standard
value: 500
globalDefault: true
description: "Standard priority — GreenOrch carbon-aware scheduling"
